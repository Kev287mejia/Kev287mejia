<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%" style="background-color: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <!-- Definition of filters and gradients -->
  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#21262d" stroke-width="0.75"/>
    </pattern>

    <!-- Radial Glows -->
    <radialGradient id="blue-glow" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="green-glow" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#238636" stop-opacity="0" />
    </radialGradient>

    <!-- Line Gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#1f6feb" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background and Grids -->
  <rect width="100%" height="100%" fill="#0d1117" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Glowing Background Orbs -->
  <rect width="100%" height="100%" fill="url(#blue-glow)" />
  <rect width="100%" height="100%" fill="url(#green-glow)" />

  <!-- Code Decorators (Left side) -->
  <g transform="translate(40, 45)">
    <!-- Terminal window header -->
    <circle cx="10" cy="10" r="4" fill="#ff5f56" />
    <circle cx="22" cy="10" r="4" fill="#ffbd2e" />
    <circle cx="34" cy="10" r="4" fill="#27c93f" />
    
    <!-- Code Lines -->
    <text x="0" y="38" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58a6ff">&gt; const developer = {</text>
    <text x="20" y="58" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ff79c6">  focus<tspan fill="#e2e8f0">:</tspan> <tspan fill="#f1fa8c">["FullStack", "DataScience", "Algorithms"]</tspan><tspan fill="#e2e8f0">,</tspan></text>
    <text x="20" y="78" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ff79c6">  metrics<tspan fill="#e2e8f0">:</tspan> <tspan fill="#f1fa8c">["CleanCode", "Performance", "Security"]</tspan><tspan fill="#e2e8f0">,</tspan></text>
    <text x="20" y="98" font-family="'Courier New', Courier, monospace" font-size="13" fill="#ff79c6">  status<tspan fill="#e2e8f0">:</tspan> <tspan fill="#f1fa8c">"Building systems that scale"</tspan></text>
    <text x="0" y="118" font-family="'Courier New', Courier, monospace" font-size="13" font-weight="bold" fill="#58a6ff">};</text>
  </g>

  <!-- Mathematical / Wave Graphs (Right side) -->
  <g transform="translate(480, 0)" opacity="0.85">
    <!-- Graph Axes -->
    <line x1="0" y1="100" x2="280" y2="100" stroke="#30363d" stroke-dasharray="4" />
    
    <!-- Mathematical Waves -->
    <path d="M 0,100 C 50,20 100,180 150,100 C 200,20 230,120 280,100" fill="none" stroke="url(#line-grad)" stroke-width="2.5" stroke-linecap="round" />
    <path d="M 0,100 C 30,150 80,40 130,100 C 180,160 220,50 280,100" fill="none" stroke="#1f6feb" stroke-width="1" opacity="0.3" stroke-linecap="round" />

    <!-- Math Points -->
    <circle cx="150" cy="100" r="4" fill="#58a6ff" />
    <circle cx="50" cy="53" r="3" fill="#388bfd" />
    <circle cx="200" cy="46" r="3" fill="#388bfd" />
    
    <!-- Code Bracket Decorative -->
    <text x="240" y="150" font-family="system-ui, sans-serif" font-size="90" font-weight="100" fill="#30363d" opacity="0.5">}</text>
  </g>

  <!-- Decorative technical lines -->
  <rect x="0" y="196" width="100%" height="4" fill="#21262d" />
  <rect x="250" y="196" width="150" height="4" fill="#1f6feb" />
</svg>
